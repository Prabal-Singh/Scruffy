name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[portal,dev]"
      - name: Unit tests
        run: pytest -q tests/ -k "not ollama"

  fixturebench-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Scruffy + FixtureBench
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[portal,dev]"
          pip install "fixturebench[envs,playwright] @ git+https://github.com/Prabal-Singh/fixturebench.git"
          playwright install chromium --with-deps
      - name: FixtureBench smoke (Scruffy dogfood)
        run: |
          PYTHONPATH=src:. python scripts/run_fixturebench_smoke.py --no-write
        env:
          PYTHONUNBUFFERED: "1"
